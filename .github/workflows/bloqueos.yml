name: Actualizar bloqueos Bolivia

# Refresca bloqueos.json desde el dataset abierto de @mauforonda (que archiva el
# registro de incidentes de la ABC cada ~2h). ingest_bloqueos.py es solo stdlib.
# Corre en main (los schedules solo disparan desde la rama por defecto); el cron
# */12 del VPS recoge el bloqueos.json actualizado en su ciclo normal de publish.
on:
  schedule:
    - cron: '15 */3 * * *'   # cada 3 horas (offset 15 min)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Ingesta bloqueos
        run: python3 ingest_bloqueos.py
      - name: Commit si cambió
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bloqueos.json
          if git diff --cached --quiet; then
            echo "bloqueos.json sin cambios"; exit 0
          fi
          git commit -m "chore(bloqueos): actualización automática de datos"
          git push
