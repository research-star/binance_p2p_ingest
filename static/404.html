<body>
<div class="w">Redirigiendo…</div>
<script>
  // Capture requested path (incl. querystring + hash) and bounce to "/" with
  // ?path=<encoded>. The SPA reads it, history.replaceState's to the real
  // path, and activates the matching tab. Fallbacks to "/" if no match.
  (function(){
    var p = window.location.pathname + window.location.search + window.location.hash;
    window.location.replace('/?path=' + encodeURIComponent(p));
  })();
</script>
</body>
