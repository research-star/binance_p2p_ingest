<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FinanzasBo — ASFI</title>
<!-- La sección ASFI vive como pestaña de la SPA (/asfi). En GitHub Pages tanto
     /asfi como /asfi.html resuelven a ESTE archivo (clean-URL), así que NO se
     puede redirigir a /asfi: re-servía asfi.html y hacía loop infinito
     ("Redirigiendo…" eterno). En su lugar rebotamos a /?path=/asfi, que sirve
     index.html (la SPA); ésta lee ?path, hace replaceState a /asfi y activa la
     pestaña ASFI (por defecto, el último informe). Preserva el deep-link de
     fecha (#YYYY-MM-DD). Mismo patrón que 404.html. -->
<style>html,body{margin:0;background:#F7E4D7;color:#2c4a6b;font:14px/1.4 system-ui,sans-serif}.w{padding:40px 20px;text-align:center}</style>
</head>
<body>
<div class="w">Redirigiendo&hellip;</div>
<script>
  window.location.replace('/?path=' + encodeURIComponent('/asfi' + window.location.hash));
</script>
</body>
</html>
